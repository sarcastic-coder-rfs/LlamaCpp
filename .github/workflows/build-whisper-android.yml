name: Build whisper.cpp Android ARM64

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          ref: v1.8.3

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - name: Patch CMake to build whisper as shared with static ggml
        run: |
          # Force whisper target to SHARED so ggml is statically linked inside.
          # This avoids .so conflicts with llama.cpp's own ggml .so files.
          sed -i 's/add_library(whisper$/add_library(whisper SHARED/' src/CMakeLists.txt
          echo 'target_compile_definitions(whisper PRIVATE WHISPER_SHARED WHISPER_BUILD)' >> src/CMakeLists.txt
          echo "Patched src/CMakeLists.txt to force whisper SHARED with exports"

      - name: Configure CMake (static ggml, shared whisper)
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_VISIBILITY_PRESET=hidden \
            -DCMAKE_CXX_VISIBILITY_PRESET=hidden

      - name: Build
        run: cmake --build build --config Release --target whisper -j $(nproc)

      - name: Package shared library (self-contained, ggml statically linked)
        run: |
          mkdir -p package
          LLVM_NM="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm"
          LLVM_READELF="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          CANDIDATES=$(find build -name 'libwhisper.so' | sort)
          SELECTED=""

          if [ -z "$CANDIDATES" ]; then
            echo "No libwhisper.so candidates found under build/."
            exit 1
          fi

          for CAND in $CANDIDATES; do
            if "$LLVM_NM" -D "$CAND" | grep -q " T whisper_full$" && \
               "$LLVM_NM" -D "$CAND" | grep -q " T whisper_free$" && \
               "$LLVM_READELF" -Ws "$CAND" | grep -Eq "GLOBAL[[:space:]]+DEFAULT[[:space:]].*whisper_full$" && \
               "$LLVM_READELF" -Ws "$CAND" | grep -Eq "GLOBAL[[:space:]]+DEFAULT[[:space:]].*whisper_free$"; then
              SELECTED="$CAND"
              break
            fi
          done

          if [ -z "$SELECTED" ]; then
            echo "No libwhisper.so with exported whisper_* C API symbols was found."
            echo "Candidates:"
            for CAND in $CANDIDATES; do
              echo " - $CAND"
              "$LLVM_NM" -D "$CAND" | head -n 20 || true
              "$LLVM_READELF" -Ws "$CAND" | grep -E "whisper_|Java_com_whispercpp" | head -n 20 || true
            done
            exit 1
          fi

          cp "$SELECTED" package/libwhisper.so
          echo "Selected whisper library: $SELECTED"
          "$LLVM_READELF" -Ws "$SELECTED" | grep -E "whisper_full$|whisper_free$"
          ls -la package/
          cd package && zip -r ../whisper-android-arm64-v8a.zip *.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-android-arm64-v8a
          path: whisper-android-arm64-v8a.zip
